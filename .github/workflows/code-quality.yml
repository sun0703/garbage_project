# 代码质量检查工作流
# 每次提交和 PR 时运行详细的代码分析

name: Code Quality

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main]

jobs:
  # ============================================================
  # 超级 Lint（更严格的检查）
  # ============================================================
  super-lint:
    name: 🎯 Super-Lint
    runs-on: ubuntu-latest
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 获取完整历史用于某些检查

      - name: 运行 GitHub Super-Linter
        uses: github/super-linter/slim@v6
        env:
          DEFAULT_BRANCH: main
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # 启用多种 linter
          VALIDATE_PYTHON_BLACK: true
          VALIDATE_PYTHON_FLAKE8: true
          VALIDATE_PYTHON_ISORT: true
          VALIDATE_PYTHON_PYLINT: true
          VALIDATE_JSON: true
          VALIDATE_YAML: true
          VALIDATE_MD: true
          VALIDATE_BASH: true
          # 错误级别
          ERROR_ON_MISSING_EXECUTABLE: false
          LINTER_RULES_PATH: .github/linters/

  # ============================================================
  # 代码复杂度分析
  # ============================================================
  complexity:
    name: 📊 Complexity Analysis
    runs-on: ubuntu-latest
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装分析工具
        run: pip install radon xenon

      - name: 分析代码复杂度
        run: |
          echo "## 代码复杂度报告" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "### 圈复杂度 (Cyclomatic Complexity)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cc -a -s main.py utils/ 2>/dev/null || echo "暂无数据" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 维护性指数 (Maintainability Index)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          mi -s main.py utils/ 2>/dev/null || echo "暂无数据" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> **说明**: 圈复杂度 A(1-5)优秀, B(6-10)良好, C(11-20)一般, D(21+)需重构" >> $GITHUB_STEP_SUMMARY

  # ============================================================
  # 文档生成检查
  # ============================================================
  docs-check:
    name: 📚 Documentation Check
    runs-on: ubuntu-latest
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装工具
        run: pip install pyment

      - name: 检查文档覆盖率
        run: |
          echo "📝 检查文档注释..."
          
          # 统计有 docstring 的函数/类数量
          total_functions=$(grep -r "def \|class " --include="*.py" . | grep -v ".venv" | wc -l)
          documented_functions=$(grep -r '"""' --include="*.py" . | grep -v ".venv" | wc -l)
          
          if [ "$total_functions" -gt 0 ]; then
            coverage=$((documented_functions * 100 / total_functions))
            echo "✅ 文档覆盖率: ${coverage}%"
            echo "   总函数数: $total_functions"
            echo "   已文档化: $documented_functions"
            
            if [ $coverage -lt 50 ]; then
              echo "::warning::文档覆盖率低于 50%，建议增加注释"
            fi
          else
            echo "⚠️ 未找到 Python 函数"
          fi

  # ============================================================
  # 变更影响分析
  # ============================================================
  change-impact:
    name: 🔍 Change Impact Analysis
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 获取变更统计
        id: changes
        run: |
          echo "## 🔍 PR 变更影响分析" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # 获取变更文件列表
          files=$(git diff --name-only origin/main...HEAD | wc -l)
          additions=$(git diff --numstat origin/main...HEAD | awk '{add += $1} END {print add+0}')
          deletions=$(git diff --numstat origin/main...HEAD | awk '{del += $2} END {print del+0}')
          
          echo "### 📊 变更统计" >> $GITHUB_STEP_SUMMARY
          echo "- **变更文件数**: $files" >> $GITHUB_STEP_SUMMARY
          echo "- **新增行数**: +$additions" >> $GITHUB_STEP_SUMMARY
          echo "- **删除行数**: -$deletions" >> $GITHUB_STEP_SUMMARY
          echo "- **净变化**: $(( additions - deletions )) 行" >> $GITHUB_STEP_SUMMARY
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📁 变更文件列表" >> $GITHUB_STEP_SUMMARY
          git diff --name-only origin/main...HEAD | while read file; do
            echo "- \`$file\`" >> $GITHUB_STEP_SUMMARY
          done
          
          # 输出供后续使用
          echo "changed_files=$files" >> $GITHUB_OUTPUT
          echo "net_change=$(( additions - deletions ))" >> $GITHUB_OUTPUT

      - name: 检查 PR 大小
        if: steps.changes.outputs.changed_files > 10 || steps.changes.outputs.net_change > 500
        run: |
          echo "::warning::这个 PR 比较大（${{ steps.changes.outputs.changed_files }} 个文件，${{ steps.changes.outputs.net_change }} 行变更）"
          echo "建议拆分成多个小的 PR 以便于审查"
