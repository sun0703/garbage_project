<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>校园垃圾分类AI助手</title>
    <style>
        /* ========== 设计令牌（Design Tokens）========== */
        :root {
            --primary: #2D9B5E;
            --primary-light: #3DB974;
            --primary-dark: #1E7A47;
            --secondary: #4ECDC4;
            --accent: #FF9F43;
            --accent-light: #FFBE76;
            --bg-base: #F0F7F4;
            --bg-card: rgba(255, 255, 255, 0.88);
            --text-primary: #1A1A2E;
            --text-secondary: #5A6776;
            --text-muted: #95A0AA;
            --border: rgba(45, 155, 94, 0.12);
            --shadow-sm: 0 2px 8px rgba(45, 155, 94, 0.06);
            --shadow-md: 0 4px 20px rgba(45, 155, 94, 0.08);
            --shadow-lg: 0 8px 40px rgba(45, 155, 94, 0.10);
            --radius-sm: 10px;
            --radius-md: 16px;
            --radius-lg: 24px;
            --radius-full: 9999px;
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* ========== 全局重置 ========== */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        /* 仅屏幕阅读器可见（可访问性） */
        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border-width: 0;
        }

        /* 跳转到主内容链接 */
        .skip-link {
            position: absolute;
            top: -40px;
            left: 0;
            background: var(--primary);
            color: white;
            padding: 8px 16px;
            text-decoration: none;
            border-radius: 0 0 var(--radius-sm) 0;
            z-index: 100;
            font-weight: 600;
            font-size: 14px;
            transition: top var(--transition);
        }
        .skip-link:focus {
            top: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                         "Helvetica Neue", Arial, "PingFang SC", sans-serif;
            /* 多层渐变背景：浅绿底色 + 顶部装饰渐变 */
            background:
                linear-gradient(180deg, rgba(45, 155, 94, 0.07) 0%, transparent 40%),
                linear-gradient(135deg, #E8F5EE 0%, #F0F7F4 40%, #FAFCFA 100%);
            min-height: 100vh;
            color: var(--text-primary);
            -webkit-font-smoothing: antialiased;
            position: relative;
            overflow-x: hidden;
        }

        /* 背景装饰性圆形光斑 */
        body::before {
            content: "";
            position: fixed;
            top: -80px;
            right: -60px;
            width: 240px;
            height: 240px;
            background: radial-gradient(circle, rgba(78, 205, 196, 0.15) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
        }
        body::after {
            content: "";
            position: fixed;
            bottom: 10%;
            left: -80px;
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(45, 155, 94, 0.08) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
        }

        /* ========== 主容器 ========== */
        .container {
            max-width: 480px;
            margin: 0 auto;
            padding: 20px 16px;
            min-height: 100vh;
            position: relative;
            z-index: 1;
        }

        /* ========== 头部区域 ========== */
        .header {
            text-align: center;
            padding: 28px 0 20px;
            animation: fadeInDown 0.6s ease both;
        }
        .header-inner {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            justify-content: center;
        }
        .header-logo {
            width: 42px;
            height: 42px;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: var(--shadow-md);
        }
        .header-logo svg {
            width: 24px;
            height: 24px;
            fill: white;
        }
        .header h1 {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: 0.5px;
        }
        .header p {
            font-size: 13px;
            color: var(--text-muted);
            margin-top: 8px;
            letter-spacing: 0.5px;
        }
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-16px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ========== 卡片容器（毛玻璃效果）========== */
        .card {
            background: var(--bg-card);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: var(--radius-lg);
            padding: 24px;
            box-shadow: var(--shadow-lg);
            border: 1px solid rgba(255, 255, 255, 0.6);
            margin-bottom: 16px;
            animation: fadeInUp 0.55s ease both;
            animation-delay: 0.1s;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ========== 拍照上传区域 ========== */
        .upload-area {
            border: 2px dashed var(--border);
            border-radius: var(--radius-md);
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all var(--transition);
            position: relative;
            overflow: hidden;
            background: linear-gradient(135deg, rgba(45, 155, 94, 0.02), rgba(78, 205, 196, 0.03));
        }
        .upload-area:hover,
        .upload-area.active {
            border-color: var(--primary);
            background: linear-gradient(135deg, rgba(45, 155, 94, 0.05), rgba(78, 205, 196, 0.06));
            box-shadow: inset 0 0 0 2px rgba(45, 155, 94, 0.08);
        }
        .upload-icon-wrap {
            width: 64px;
            height: 64px;
            margin: 0 auto 14px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 16px rgba(45, 155, 94, 0.2);
            transition: transform var(--transition);
        }
        .upload-area:hover .upload-icon-wrap {
            transform: scale(1.06);
        }
        .upload-icon-wrap svg {
            width: 28px;
            height: 28px;
            stroke: white;
            stroke-width: 2;
            fill: none;
        }
        .upload-area .text {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 4px;
        }
        .upload-area .sub-text {
            font-size: 12px;
            color: var(--text-muted);
        }
        .upload-area img {
            max-width: 100%;
            max-height: 260px;
            border-radius: var(--radius-sm);
            display: none;
            object-fit: contain;
        }
        .upload-area.has-image img { display: block; }
        .upload-area.has-image .upload-icon-wrap,
        .upload-area.has-image .text,
        .upload-area.has-image .sub-text { display: none; }

        .hidden-input { display: none; }

        /* ========== 分割线 ========== */
        .divider {
            display: flex;
            align-items: center;
            margin: 18px 0;
            color: var(--text-muted);
            font-size: 12px;
            font-weight: 500;
        }
        .divider::before, .divider::after {
            content: "";
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--border), transparent);
        }
        .divider span { padding: 0 14px; }

        /* ========== 搜索区域 ========== */
        .search-box {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .search-input {
            flex: 1;
            height: 48px;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-full);
            padding: 0 18px;
            font-size: 15px;
            outline: none;
            transition: all var(--transition);
            background: rgba(255, 255, 255, 0.7);
            color: var(--text-primary);
        }
        .search-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(45, 155, 94, 0.1);
            background: white;
        }
        .search-input::placeholder { color: var(--text-muted); }
        .voice-btn {
            width: 48px;
            height: 48px;
            border: none;
            border-radius: var(--radius-full);
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            color: white;
            cursor: pointer;
            transition: all var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 12px rgba(45, 155, 94, 0.25);
            flex-shrink: 0;
        }
        .voice-btn:hover {
            opacity: 0.92;
            transform: translateY(-1px);
            box-shadow: 0 6px 18px rgba(45, 155, 94, 0.32);
        }
        .voice-btn:active { transform: scale(0.95); }
        .voice-btn svg {
            width: 20px;
            height: 20px;
            fill: white;
        }
        .voice-btn.listening {
            background: linear-gradient(135deg, #E74C3C, #C0392B);
            box-shadow: 0 4px 12px rgba(231, 76, 60, 0.35);
            animation: voicePulse 1.2s infinite;
        }
        @keyframes voicePulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(231, 76, 60, 0.35); }
            50% { box-shadow: 0 0 0 14px rgba(231, 76, 60, 0); }
        }

        /* ========== 操作按钮组 ========== */
        .btn-group {
            display: flex;
            gap: 12px;
            margin-top: 18px;
        }
        .btn {
            flex: 1;
            height: 50px;
            border: none;
            border-radius: var(--radius-full);
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            letter-spacing: 0.3px;
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            color: white;
            box-shadow: 0 4px 16px rgba(45, 155, 94, 0.28);
        }
        .btn-primary:hover:not(:disabled) {
            opacity: 0.93;
            transform: translateY(-2px);
            box-shadow: 0 6px 22px rgba(45, 155, 94, 0.36);
        }
        .btn-primary:active:not(:disabled) { transform: translateY(0); }
        .btn-primary:disabled {
            opacity: 0.45;
            cursor: not-allowed;
            box-shadow: none;
            background: linear-gradient(135deg, #B8D8C8, #A0CCA0);
        }
        .btn-secondary {
            background: white;
            color: var(--text-secondary);
            border: 1.5px solid var(--border);
            box-shadow: var(--shadow-sm);
        }
        .btn-secondary:hover {
            background: var(--bg-base);
            border-color: var(--primary);
            color: var(--primary);
        }
        .btn-secondary svg {
            width: 17px;
            height: 17px;
            stroke: currentColor;
            stroke-width: 2;
            fill: none;
        }

        /* ========== 结果展示区 ========== */
        .result-section {
            display: none;
        }
        .result-section.show {
            display: block;
            animation: resultIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both;
        }
        @keyframes resultIn {
            from { opacity: 0; transform: translateY(16px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .result-header {
            text-align: center;
            padding: 8px 0 16px;
        }
        .category-badge {
            display: inline-block;
            padding: 8px 28px;
            border-radius: var(--radius-full);
            color: white;
            font-size: 17px;
            font-weight: 700;
            margin-bottom: 12px;
            letter-spacing: 1px;
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.15);
        }
        .item-name {
            font-size: 26px;
            font-weight: 800;
            color: var(--text-primary);
            letter-spacing: 0.5px;
        }
        .confidence-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 12px;
            font-size: 13px;
            color: var(--text-secondary);
            font-weight: 500;
        }
        .confidence-bar {
            width: 140px;
            height: 8px;
            background: rgba(0, 0, 0, 0.06);
            border-radius: var(--radius-full);
            overflow: hidden;
        }
        .confidence-fill {
            height: 100%;
            border-radius: var(--radius-full);
            transition: width 0.7s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .confidence-fill.high   { background: linear-gradient(90deg, #27AE60, #58D68D); }
        .confidence-fill.medium { background: linear-gradient(90deg, #F39C12, #F7DC6F); }
        .confidence-fill.low    { background: linear-gradient(90deg, #E74C3C, #F1948A); }

        .guidance-box {
            background: linear-gradient(135deg, rgba(45, 155, 94, 0.04), rgba(78, 205, 196, 0.04));
            border-radius: var(--radius-sm);
            padding: 16px 18px;
            margin-top: 16px;
            border-left: 4px solid var(--primary);
        }
        .guidance-label {
            font-size: 12px;
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .guidance-text {
            font-size: 15px;
            color: var(--text-primary);
            line-height: 1.65;
        }

        .inference-info {
            text-align: center;
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 14px;
            padding-top: 12px;
            border-top: 1px solid var(--border);
        }

        /* ========== 搜索结果列表 ========== */
        .search-results { margin-top: 8px; }
        .search-item {
            padding: 14px 12px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: all var(--transition);
            border-radius: var(--radius-sm);
        }
        .search-item:last-child { border-bottom: none; }
        .search-item:hover {
            background: rgba(45, 155, 94, 0.04);
            transform: translateX(2px);
        }
        .search-item:active {
            background: rgba(45, 155, 94, 0.08);
            transform: translateX(0);
        }
        .search-item:focus-visible {
            outline: 2px solid var(--primary);
            outline-offset: -2px;
            background: rgba(45, 155, 94, 0.06);
        }
        .search-item-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .search-item-icon {
            width: 40px;
            height: 40px;
            border-radius: var(--radius-sm);
            background: linear-gradient(135deg, rgba(45, 155, 94, 0.08), rgba(78, 205, 196, 0.1));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
        }
        .search-item-label {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-primary);
        }
        .search-item-category {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 2px;
        }
        .search-score {
            font-size: 13px;
            font-weight: 700;
            padding: 5px 12px;
            border-radius: var(--radius-full);
            background: linear-gradient(135deg, rgba(39, 174, 96, 0.1), rgba(88, 214, 141, 0.12));
            color: #1E8449;
            flex-shrink: 0;
        }

        /* ========== 加载状态（升级版）========== */
        .loading-overlay {
            display: none;
            position: absolute;
            inset: 0;
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            border-radius: var(--radius-lg);
            z-index: 10;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 16px;
        }
        .loading-overlay.show { display: flex; }
        .spinner {
            width: 40px;
            height: 40px;
            position: relative;
        }
        .spinner::before {
            content: "";
            position: absolute;
            inset: 0;
            border: 3.5px solid rgba(45, 155, 94, 0.12);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.75s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-text {
            font-size: 14px;
            color: var(--text-secondary);
            font-weight: 500;
        }

        /* ========== 错误状态 ========== */
        .error-msg {
            display: none;
            color: #E74C3C;
            font-size: 13px;
            text-align: center;
            padding: 12px 16px;
            background: rgba(231, 76, 60, 0.05);
            border-radius: var(--radius-sm);
            margin-top: 14px;
            border: 1px solid rgba(231, 76, 60, 0.1);
            font-weight: 500;
        }
        .error-msg.show { display: block; animation: shake 0.4s ease; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-6px); }
            75% { transform: translateX(6px); }
        }

        /* ========== 压缩优化提示 ========== */
        .compress-hint {
            display: none;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: var(--primary);
            padding: 10px 14px;
            background: rgba(45, 155, 94, 0.06);
            border-radius: var(--radius-sm);
            margin-top: 10px;
            border: 1px solid rgba(45, 155, 94, 0.1);
            animation: fadeInUp 0.3s ease both;
        }
        .compress-hint.show { display: flex; }
        .compress-icon {
            font-size: 14px;
            flex-shrink: 0;
        }
        .compress-text {
            line-height: 1.4;
        }

        /* ========== 处理建议步骤 ========== */
        .tips-steps {
            margin-top: 12px;
            padding: 0;
            list-style: none;
        }
        .tips-steps li {
            position: relative;
            padding: 6px 0 6px 28px;
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.5;
            border-bottom: 1px dashed rgba(45, 155, 94, 0.08);
        }
        .tips-steps li:last-child {
            border-bottom: none;
        }
        .tips-steps li::before {
            content: attr(data-step);
            position: absolute;
            left: 0;
            top: 6px;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            color: white;
            font-size: 11px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ========== 分享按钮 ========== */
        .share-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 18px;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-full);
            background: white;
            color: var(--text-secondary);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition);
            margin-top: 12px;
        }
        .share-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
            background: rgba(45, 155, 94, 0.04);
        }
        .share-btn svg {
            width: 15px;
            height: 15px;
            stroke: currentColor;
            stroke-width: 2;
            fill: none;
        }
        .share-toast {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: var(--text-primary);
            color: white;
            padding: 10px 22px;
            border-radius: var(--radius-full);
            font-size: 13px;
            font-weight: 500;
            opacity: 0;
            transition: all 0.3s ease;
            z-index: 999;
            pointer-events: none;
        }
        .share-toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* ========== 历史记录侧边栏 ========== */
        .history-toggle {
            position: fixed;
            right: 16px;
            bottom: 100px;
            width: 48px;
            height: 48px;
            border: none;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            color: white;
            cursor: pointer;
            box-shadow: 0 4px 16px rgba(45, 155, 94, 0.3);
            z-index: 90;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all var(--transition);
        }
        .history-toggle:hover {
            transform: scale(1.08);
            box-shadow: 0 6px 22px rgba(45, 155, 94, 0.38);
        }
        .history-toggle svg {
            width: 20px;
            height: 20px;
            fill: white;
        }
        .history-badge {
            position: absolute;
            top: -2px;
            right: -2px;
            min-width: 18px;
            height: 18px;
            border-radius: 9px;
            background: #E74C3C;
            color: white;
            font-size: 10px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 5px;
            border: 2px solid white;
        }
        .history-drawer-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.35);
            z-index: 99;
            opacity: 0;
            transition: opacity 0.25s ease;
        }
        .history-drawer-overlay.show {
            display: block;
            opacity: 1;
        }
        .history-drawer {
            position: fixed;
            right: -320px;
            top: 0;
            bottom: 0;
            width: 300px;
            max-width: 85vw;
            background: white;
            box-shadow: -8px 0 32px rgba(0, 0, 0, 0.12);
            z-index: 100;
            transition: right 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
        }
        .history-drawer.open {
            right: 0;
        }
        .history-drawer-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px 20px;
            border-bottom: 1px solid var(--border);
        }
        .history-drawer-title {
            font-size: 16px;
            font-weight: 700;
            color: var(--text-primary);
        }
        .history-drawer-actions {
            display: flex;
            gap: 8px;
        }
        .history-action-btn {
            padding: 5px 12px;
            border: 1px solid var(--border);

<script>
// ==================== 全局状态 ====================
let selectedImage = null;
let originalFileSize = 0;          /* 原始文件大小（字节） */
let compressedFileSize = 0;        /* 压缩后文件大小（字节） */
const API_BASE = "";

// ==================== 图片压缩处理器 ====================
/**
 * ImageProcessor - 基于 Canvas API 的图片压缩工具
 * 负责图片格式校验、尺寸缩放、质量压缩、Base64 转换
 * 适用场景：上传前客户端压缩，减少传输体积和服务器负载
 */
const ImageProcessor = {
    /** 允许的图片格式白名单 */
    ALLOWED_TYPES: ["image/jpeg", "image/png", "image/webp", "image/gif"],

    /** 文件大小上限（5MB） */
    MAX_FILE_SIZE: 5 * 1024 * 1024,

    /** 压缩目标大小（2MB = 2048KB） */
    TARGET_SIZE_KB: 2048,

    /** 图片最大边长（超过则等比缩放） */
    MAX_DIMENSION: 1280,

    /** 初始压缩质量（0-1，JPEG 格式） */
    INITIAL_QUALITY: 0.85,

    /** 最低压缩质量阈值（低于此值停止压缩以避免过度失真） */
    MIN_QUALITY: 0.3,

    /** 质量递减步长 */
    QUALITY_STEP: 0.08,

    /**
     * 校验图片文件格式和大小
     * @param {File} file - 用户选择的文件对象
     * @returns {{ valid: boolean, error: string }} 校验结果
     */
    validate(file) {
        if (!this.ALLOWED_TYPES.includes(file.type)) {
            return {
                valid: false,
                error: "请选择 JPG/PNG/WebP/GIF 格式的图片"
            };
        }
        if (file.size > this.MAX_FILE_SIZE) {
            return {
                valid: false,
                error: `图片过大（${this._formatSize(file.size)}），请选择 5MB 以内的图片`
            };
        }
        return { valid: true };
    },

    /**
     * 压缩图片至目标大小以下
     * 使用 Canvas API 进行客户端压缩：
     *   1. 等比缩放至最大边长限制（保持宽高比）
     *   2. 逐步降低 JPEG 质量直至满足大小要求
     *
     * @param {File} file - 原始文件
     * @param {number} [maxSizeKB] - 目标最大大小（KB），默认 2048
     * @returns {Promise<{ base64: string, compressedSize: number, ratio: number }>}
     *   base64: 压缩后的 Base64 DataURL
     *   compressedSize: 压缩后字节数
     *   ratio: 压缩比例（compressedSize / originalSize）
     */
    compress(file, maxSizeKB = this.TARGET_SIZE_KB) {
        return new Promise((resolve, reject) => {
            const img = new Image();
            img.onload = () => {
                try {
                    const result = this._doCompress(img, maxSizeKB);
                    resolve(result);
                } catch (err) {
                    reject(err);
                }
            };
            img.onerror = () => reject(new Error("图片加载失败"));
            img.src = URL.createObjectURL(file);
        });
    },

    /**
     * 执行实际的 Canvas 压缩逻辑（内部方法）
     * @private
     */
    _doCompress(img, maxSizeKB) {
        const canvas = document.createElement("canvas");
        const ctx = canvas.getContext("2d");

        /* 计算缩放后的尺寸（保持宽高比，最长边不超过 MAX_DIMENSION） */
        let { width, height } = img;
        const maxDim = this.MAX_DIMENSION;

        if (width > height && width > maxDim) {
            height = Math.round((height * maxDim) / width);
            width = maxDim;
        } else if (height > maxDim) {
            width = Math.round((width * maxDim) / height);
            height = maxDim;
        }

        canvas.width = width;
        canvas.height = height;

        /* 绘制到 Canvas（自动处理透明通道：PNG→JPEG 时白色背景填充） */
        ctx.fillStyle = "#FFFFFF";
        ctx.fillRect(0, 0, width, height);
        ctx.drawImage(img, 0, 0, width, height);

        /* 异步压缩：使用 toBlob 获取精确大小 */
        return new Promise((resolve) => {
            const targetBytes = maxSizeKB * 1024;

            canvas.toBlob(
                (blob) => {
                    if (!blob) {
                        /* toBlob 失败时回退到同步版本 */
                        console.warn("[ImageProcessor] canvas.toBlob 返回空，使用同步压缩");
                        const syncResult = canvas.toDataURL("image/jpeg", this.INITIAL_QUALITY);
                        const estimatedSize = Math.round(syncResult.length * 0.75);
                        resolve({
                            base64: syncResult,
                            compressedSize: estimatedSize,
                            ratio: estimatedSize / (originalFileSize || 1)
                        });
                        return;
                    }

                    /* 如果已满足大小要求，直接返回 */
                    if (blob.size <= targetBytes) {
                        const reader = new FileReader();
                        reader.onloadend = () => resolve({
                            base64: reader.result,
                            compressedSize: blob.size,
                            ratio: blob.size / (originalFileSize || 1)
                        });
                        reader.readAsDataURL(blob);
                        return;
                    }

                    /* Blob 过大：逐步降低质量重试 */
                    let quality = this.INITIAL_QUALITY;
                    const tryCompress = () => {
                        quality -= this.QUALITY_STEP;

                        if (quality < this.MIN_QUALITY) {
                            /* 质量已达最低阈值，返回当前结果 */
                            const reader = new FileReader();
                            reader.onloadend = () => resolve({
                                base64: reader.result,
                                compressedSize: blob.size,
                                ratio: blob.size / (originalFileSize || 1)
                            });
                            reader.readAsDataURL(blob);
                            return;
                        }

                        canvas.toBlob(
                            (newBlob) => {
                                if (newBlob && newBlob.size <= targetBytes) {
                                    const reader = new FileReader();
                                    reader.onloadend = () => resolve({
                                        base64: reader.result,
                                        compressedSize: newBlob.size,
                                        ratio: newBlob.size / (originalFileSize || 1)
                                    });
                                    reader.readAsDataURL(newBlob);
                                } else {
                                    tryCompress();
                                }
                            },
                            "image/jpeg",
                            quality
                        );
                    };

                    tryCompress();
                },
                "image/jpeg",
                this.INITIAL_QUALITY
            );
        });
    },

    /**
     * 将 Blob 对象转换为 Base64 DataURL 字符串
     * @private
     */
    _convertToBase64(blob) {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.onloadend = () => resolve(reader.result);
            reader.readAsDataURL(blob);
        });
    },

    /**
     * 格式化文件大小为人类可读字符串
     * @param {number} bytes - 字节数
     * @returns {string} 如 "1.2 MB"、"256 KB"
     */
    _formatSize(bytes) {
        if (bytes >= 1024 * 1024) {
            return (bytes / (1024 * 1024)).toFixed(1) + " MB";
        }
        return Math.round(bytes / 1024) + " KB";
    }
};

// ==================== DOM 元素引用 ====================
const fileInput = document.getElementById("fileInput");
const uploadArea = document.getElementById("uploadArea");
const previewImg = document.getElementById("previewImg");
const predictBtn = document.getElementById("predictBtn");
const loadingOverlay = document.getElementById("loadingOverlay");
const loadingText = document.getElementById("loadingText");
const errorMsg = document.getElementById("errorMsg");
const resultSection = document.getElementById("resultSection");
const searchResultSection = document.getElementById("searchResultSection");
const searchInput = document.getElementById("searchInput");
const voiceBtn = document.getElementById("voiceBtn");

// ==================== 图片选择事件（含压缩处理）====================
fileInput.addEventListener("change", function(e) {
    const file = e.target.files[0];
    if (!file) return;

    /* 使用 ImageProcessor 校验文件格式和大小（替代硬编码检查） */
    const validation = ImageProcessor.validate(file);
    if (!validation.valid) {
        showError(validation.error);
        return;
    }

    /* 记录原始文件大小，用于后续压缩率计算 */
    originalFileSize = file.size;
    compressedFileSize = 0;

    /* 先读取原始图片用于预览显示（保持视觉质量） */
    const reader = new FileReader();
    reader.onload = async function(event) {
        /* 立即显示预览图（使用未压缩的原始数据） */
        previewImg.src = event.target.result;
        uploadArea.classList.add("has-image");
        hideError();
        hideResults();

        /* 显示压缩中状态 */
        showLoading("正在优化图片...");

        try {
            /* 执行客户端压缩：Canvas 缩放 + JPEG 质量调整 */
            const compressResult = await ImageProcessor.compress(file);
            selectedImage = compressResult.base64;
            compressedFileSize = compressResult.compressedSize;

            /* 压缩完成：更新状态提示 */
            const origStr = ImageProcessor._formatSize(originalFileSize);
            const compStr = ImageProcessor._formatSize(compressedFileSize);
            const ratio = (compressResult.ratio * 100).toFixed(0);

            console.log(`[ImageProcessor] 压缩完成: ${origStr} → ${compStr} (${ratio}%)`);

            predictBtn.disabled = false;
            hideLoading();

            /* 如果压缩效果显著，短暂提示用户 */
            if (originalFileSize > 500 * 1024 && compressResult.ratio < 0.8) {
                showCompressHint(origStr, compStr, ratio);
            }
        } catch (compressErr) {
            /* 压缩失败时回退：直接使用原始 DataURL（不阻止用户操作） */
            console.warn("[ImageProcessor] 压缩失败，使用原图:", compressErr.message);
            selectedImage = event.target.result;
            compressedFileSize = originalFileSize;
            predictBtn.disabled = false;
            hideLoading();
        }
    };
    reader.readAsDataURL(file);
});

/* 拖拽上传支持 */
uploadArea.addEventListener("dragover", function(e) {
    e.preventDefault();
    uploadArea.classList.add("active");
});
uploadArea.addEventListener("dragleave", function() {
    uploadArea.classList.remove("active");
});
uploadArea.addEventListener("drop", function(e) {
    e.preventDefault();
    uploadArea.classList.remove("active");
    const file = e.dataTransfer.files[0];
    if (file && file.type.startsWith("image/")) {
        fileInput.files = e.dataTransfer.files;
        fileInput.dispatchEvent(new Event("change"));
    }
});

/* 粘贴上传支持 (Ctrl+V) */
document.addEventListener("paste", function(e) {
    const items = e.clipboardData?.items;
    if (!items) return;
    for (const item of items) {
        if (item.type.startsWith("image/")) {
            e.preventDefault();
            const file = item.getAsFile();
            if (file) {
                const dt = new DataTransfer();
                dt.items.add(file);
                fileInput.files = dt.files;
                fileInput.dispatchEvent(new Event("change"));
            }
            break;
        }
    }
});

// ==================== 识别操作 ====================
async function doPredict() {
    if (!selectedImage) return;

    showLoading("正在识别中...");
    hideError();
    hideResults();

    try {
        const response = await fetch(`${API_BASE}/api/predict`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ image: selectedImage })
        });

        const data = await response.json();
        hideLoading();

        if (data.success) {
            showPredictResult(data.result, data.inference_time_ms);
        } else {
            showError(data.error?.message || "识别失败，请重试");
        }
    } catch (err) {
        hideLoading();
        showError("网络连接失败，请检查网络");
        console.error(err);
    }
}

// ==================== 显示识别结果 ====================
function showPredictResult(result, inferTime) {
    const badge = document.getElementById("categoryBadge");
    const nameEl = document.getElementById("itemName");
    const fill = document.getElementById("confidenceFill");
    const confText = document.getElementById("confidenceText");
    const guidance = document.getElementById("guidanceText");
    const info = document.getElementById("inferenceInfo");
    const tipsContainer = document.getElementById("tipsContainer");
    const tipsSteps = document.getElementById("tipsSteps");
    const shareBtn = document.getElementById("shareBtn");

    badge.textContent = result.category || "未知";
    badge.style.background = result.bin_color || "#666";
    nameEl.textContent = result.label_cn || "未知物品";

    const conf = Math.round((result.confidence || 0) * 100);
    fill.style.width = conf + "%";

    fill.className = "confidence-fill";
    if (conf >= 90) fill.classList.add("high");
    else if (conf >= 70) fill.classList.add("medium");
    else fill.classList.add("low");

    confText.textContent = conf + "%";
    guidance.textContent = result.guidance || "暂无投放指引";
    info.textContent = inferTime ? `推理耗时 ${inferTime}ms` : "";

    if (result.tips && Array.isArray(result.tips) && result.tips.length > 0) {
        tipsSteps.innerHTML = "";
        result.tips.forEach(function(tip, i) {
            var li = document.createElement("li");
            li.setAttribute("data-step", String(i + 1));
            li.textContent = tip;
            tipsSteps.appendChild(li);
        });
        tipsContainer.style.display = "";
    } else {
        tipsContainer.style.display = "none";
    }

    shareBtn.style.display = "";
    shareBtn.onclick = function() { shareResult(result); };

    resultSection.classList.add("show");
    searchResultSection.classList.remove("show");

    saveHistory(result, inferTime);
}

// ==================== 搜索功能 ====================
searchInput.addEventListener("keydown", async function(e) {
    if (e.key === "Enter") await doSearch();
});

async function doSearch() {
    const query = searchInput.value.trim();
    if (!query) return;

    loadingText.textContent = "搜索中...";
    showLoading();
    hideError();
    hideResults();

    try {
        const response = await fetch(`${API_BASE}/api/search?query=${encodeURIComponent(query)}`);
        const data = await response.json();
        hideLoading();

        if (data.success && data.results.length > 0) {
            showSearchResults(data.results, data.query);
        } else {
            showError(`未找到"${query}"相关结果，请尝试其他关键词`);
        }
    } catch (err) {
        hideLoading();
        showError("搜索失败，请重试");
    }
}

function showSearchResults(results, query) {
    const container = document.getElementById("searchResults");
    container.innerHTML = "";

    results.forEach(function(item) {
        const div = document.createElement("div");
        div.className = "search-item";
        div.setAttribute("role", "button");
        div.setAttribute("tabindex", "0");
        div.setAttribute("aria-label", `${item.label} - ${item.category}`);
        div.innerHTML =
            `<div class="search-item-left">
                <div class="search-item-icon" aria-hidden="true">${item.bin_icon || "♻"}</div>
                <div>
                    <div class="search-item-label">${item.label}</div>
                    <div class="search-item-category">${item.category} · 相似度 ${item.similarity_score}%</div>
                </div>
            </div>
            <span class="search-score" aria-label="相似度 ${item.similarity_score}%">${item.similarity_score}%</span>`;
        const handleClick = function() {
            showPredictResult(item, 0);
        };
        div.onclick = handleClick;
        div.onkeydown = function(e) {
            if (e.key === "Enter" || e.key === " ") {
                e.preventDefault();
                handleClick();
            }
        };
        container.appendChild(div);
    });

    searchResultSection.classList.add("show");
    resultSection.classList.remove("show");
}

// ==================== 语音识别 ====================
let recognition = null;

function initSpeechRecognition() {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) {
        alert("您的浏览器不支持语音识别，请使用Chrome或Edge浏览器");
        return false;
    }

    recognition = new SpeechRecognition();
    recognition.lang = "zh-CN";
    recognition.continuous = false;
    recognition.interimResults = false;

    recognition.onstart = function() {
        voiceBtn.classList.add("listening");
        voiceBtn.querySelector("svg").outerHTML =
            '<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="6" fill="white"/></svg>';
    };

    recognition.onresult = function(event) {
        const transcript = event.results[0][0].transcript;
        searchInput.value = transcript;
        doSearch();
    };

    recognition.onerror = function(event) {
        console.warn("语音识别错误:", event.error);
        stopVoiceListening();
        if (event.error === "no-speech") {
            showError("未检测到语音，请重试");
        }
    };

    recognition.onend = function() {
        stopVoiceListening();
    };

    return true;
}

function stopVoiceListening() {
    voiceBtn.classList.remove("listening");
    voiceBtn.querySelector("svg").outerHTML =
        '<svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>';
}

voiceBtn.onclick = function() {
    if (!recognition) {
        if (!initSpeechRecognition()) return;
    }

    if (voiceBtn.classList.contains("listening")) {
        recognition.stop();
    } else {
        try {
            recognition.start();
        } catch (e) {
            console.warn("语音启动失败:", e);
        }
    }
};

/**
 * 显示图片压缩优化提示
 * 当压缩效果显著时（压缩率 < 80% 且原图 > 500KB）自动调用
 * @param {string} origSize - 原始大小字符串（如 "2.5 MB"）
 * @param {string} compSize - 压缩后大小字符串（如 "680 KB"）
 * @param {string} ratio - 压缩百分比（如 "27" 表示压缩到 27%）
 */
function showCompressHint(origSize, compSize, ratio) {
    const hintEl = document.getElementById("compressHint");
    const textEl = document.getElementById("compressText");
    if (!hintEl || !textEl) return;

    textEl.textContent = `图片已优化：${origSize} → ${compSize}（节省 ${100 - ratio}% 传输量）`;
    hintEl.classList.add("show");

    /* 3秒后自动隐藏提示 */
    setTimeout(() => {
        hintEl.classList.remove("show");
    }, 3500);
}

/** 隐藏压缩提示 */
function hideCompressHint() {
    const hintEl = document.getElementById("compressHint");
    if (hintEl) hintEl.classList.remove("show");
}

function resetAll() {
    selectedImage = null;
    originalFileSize = 0;
    compressedFileSize = 0;
    fileInput.value = "";
    previewImg.src = "";
    uploadArea.classList.remove("has-image");
    predictBtn.disabled = true;
    searchInput.value = "";
    hideError();
    hideResults();
    hideLoading();
    hideCompressHint();
}

function shareResult(result) {
    var conf = Math.round((result.confidence || 0) * 100);
    var text = "【垃圾分类识别结果】\n" +
        "物品：" + (result.label_cn || "未知") + "\n" +
        "分类：" + (result.category || "未知") + "\n" +
        "置信度：" + conf + "%\n" +
        "投放指引：" + (result.guidance || "暂无");
    if (result.tips && result.tips.length > 0) {
        text += "\n\n处理建议：\n" + result.tips.map(function(t, i) { return (i+1) + ". " + t; }).join("\n");
    }
    text += "\n\n—— 校园垃圾分类AI助手";

    if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).then(function() { showShareToast(); });
    } else {

        ta.value = text;
        ta.style.position = "fixed";
        ta.style.opacity = "0";
        document.body.appendChild(ta);
        ta.select();
        document.execCommand("copy");
        document.body.removeChild(ta);
        showShareToast();
    }
}

function showShareToast() {
    var toast = document.getElementById("shareToast");
    toast.classList.add("show");
    setTimeout(function() { toast.classList.remove("show"); }, 2000);
}

// ==================== 历史记录 localStorage (F-1.5.1~3) ====================
var HISTORY_KEY = "waste_history_max";
var MAX_HISTORY = 50;

function saveHistory(result, inferTime) {
    try {
        var list = loadHistoryRaw();
        var entry = {
            id: Date.now().toString(36) + Math.random().toString(36).substr(2, 5),
            label_cn: result.label_cn,
            category: result.category,
            bin_color: result.bin_color,
            confidence: result.confidence,
            guidance: result.guidance,
            tips: result.tips || [],
            inference_time_ms: inferTime,
            thumb: previewImg.src ? previewImg.src.substring(0, 120) : "",
            timestamp: new Date().toISOString()
        };
        list.unshift(entry);
        if (list.length > MAX_HISTORY) list = list.slice(0, MAX_HISTORY);
        localStorage.setItem(HISTORY_KEY, JSON.stringify(list));
        updateHistoryBadge(list.length);
    } catch(e) { console.warn("保存历史失败:", e); }
}

function loadHistoryRaw() {
    try {
        var raw = localStorage.getItem(HISTORY_KEY);
        return raw ? JSON.parse(raw) : [];
    } catch(e) { return []; }
}

function updateHistoryBadge(count) {
    var badge = document.getElementById("historyBadge");
    if (!badge) return;
    badge.textContent = count > 99 ? "99+" : String(count);
    badge.style.display = count > 0 ? "" : "none";
}

function renderHistoryList() {
    var listEl = document.getElementById("historyList");
    if (!listEl) return;
    var list = loadHistoryRaw();
    listEl.innerHTML = "";
    if (list.length === 0) {
        listEl.innerHTML = '<div class="history-empty"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg><div>暂无识别记录</div></div>';
        return;
    }
    list.forEach(function(item) {
        var div = document.createElement("div");
        div.className = "history-item";
        div.dataset.id = item.id;

        var thumb = document.createElement("img");
        thumb.className = "history-item-thumb";
        thumb.src = item.thumb || "data:image/svg+xml," + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="44" height="44" fill="%23eee"/><rect width="44" height="44" rx="6"/>');
        thumb.alt = "";

        var info = document.createElement("div");
        info.className = "history-item-info";

        var name = document.createElement("div");
        name.className = "history-item-name";
        name.textContent = item.label_cn || "未知";

        var meta = document.createElement("div");
        meta.className = "history-item-meta";

        var catSpan = document.createElement("span");
        catSpan.className = "history-item-cat";
        catSpan.textContent = item.category || "?";
        catSpan.style.background = item.bin_color || "#666";

        var timeText = formatTimeAgo(item.timestamp);
        var timeNode = document.createTextNode(timeText);

        meta.appendChild(catSpan);
        meta.appendChild(timeNode);
        info.appendChild(name);
        info.appendChild(meta);

        var delBtn = document.createElement("button");
        delBtn.className = "history-item-delete";
        delBtn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>';
        delBtn.title = "删除";
        delBtn.onclick = function(ev) { ev.stopPropagation(); deleteHistoryItem(item.id); };

        div.appendChild(thumb);
        div.appendChild(info);
        div.appendChild(delBtn);

        div.onclick = function() { viewHistoryItem(item); };

        listEl.appendChild(div);
    });
}

function formatTimeAgo(isoStr) {
    if (!isoStr) return "";
    var diff = Date.now() - new Date(isoStr).getTime();
    if (diff < 60000) return "刚刚";
    if (diff < 3600000) return Math.floor(diff / 60000) + "分钟前";
    if (diff < 86400000) return Math.floor(diff / 3600000) + "小时前";
    if (diff < 604800000) return Math.floor(diff / 86400000) + "天前";
    return new Date(isoStr).toLocaleDateString();
}

function deleteHistoryItem(id) {
    var list = loadHistoryRaw();
    list = list.filter(function(i) { return i.id !== id; });
    localStorage.setItem(HISTORY_KEY, JSON.stringify(list));
    updateHistoryBadge(list.length);
    renderHistoryList();
}

function clearAllHistory() {
    if (!confirm("确定清空所有识别历史？")) return;
    localStorage.removeItem(HISTORY_KEY);
    updateHistoryBadge(0);
    renderHistoryList();
}

function viewHistoryItem(item) {
    closeHistoryDrawer();

    var mockResult = {
        label_cn: item.label_cn,
        category: item.category,
        bin_color: item.bin_color,
        confidence: item.confidence,
        guidance: item.guidance,
        tips: item.tips || []
    };
    showPredictResult(mockResult, item.inference_time_ms);
}

// ==================== 历史侧边栏交互 ====================
var historyToggle = document.getElementById("historyToggle");
var historyOverlay = document.getElementById("historyOverlay");
var historyDrawer = document.getElementById("historyDrawer");
var historyCloseBtn = document.getElementById("historyCloseBtn");
var historyClearAll = document.getElementById("historyClearAll");

if (historyToggle) historyToggle.onclick = openHistoryDrawer;
if (historyOverlay) historyOverlay.onclick = closeHistoryDrawer;
if (historyCloseBtn) historyCloseBtn.onclick = closeHistoryDrawer;
if (historyClearAll) historyClearAll.onclick = clearAllHistory;

function openHistoryDrawer() {
    renderHistoryList();
    if (historyOverlay) historyOverlay.classList.add("show");
    if (historyDrawer) historyDrawer.classList.add("open");
}
function closeHistoryDrawer() {
    if (historyOverlay) historyOverlay.classList.remove("show");
    if (historyDrawer) historyDrawer.classList.remove("open");
}

updateHistoryBadge(loadHistoryRaw().length);

// ==================== 页面导航切换 (F-2.3/F-2.4) ====================
var currentPage = "recognize";

function switchPage(pageId) {
    currentPage = pageId;

    document.querySelectorAll(".nav-btn").forEach(function(btn) {
        btn.classList.toggle("active", btn.dataset.page === pageId);
    });

    document.querySelectorAll(".page-section").forEach(function(sec) {
        sec.classList.remove("active");
    });

    if (pageId === "recognize") {
        var mainCard = document.querySelector(".card");
        var resultSec = document.getElementById("resultSection");
        var searchSec = document.getElementById("searchResultSection");
        if (mainCard) mainCard.style.display = "";
        if (resultSec) resultSec.classList.add("show");
        if (searchSec) searchSec.classList.add("show");
    } else {
        var cards = document.querySelectorAll(".card");
        cards.forEach(function(c) { c.style.display = "none"; });
        var targetPage = document.getElementById("page-" + pageId);
        if (targetPage) targetPage.classList.add("active");

        if (pageId === "guide" && !document.getElementById("page-guide").dataset.loaded) {
            loadGuideData();
        }
        if (pageId === "confusing" && !document.getElementById("page-confusing").dataset.loaded) {
            loadConfusingData();
        }
    }
}

// ==================== 分类指南数据加载与渲染 (F-2.3) ====================
var guideDataCache = null;

function loadGuideData() {
    var container = document.getElementById("guideContent");
    if (!container) return;
    container.innerHTML = '<div class="guide-loading">正在加载分类标准数据...</div>';

    fetch(API_BASE + "/api/guide/standard")
        .then(function(r) { return r.json(); })
        .then(function(data) {
            guideDataCache = data;
            document.getElementById("page-guide").dataset.loaded = "1";
            renderGuide(data);
        })
        .catch(function(err) {
            console.error("加载指南数据失败:", err);
            container.innerHTML = '<div class="guide-loading" style="color:#E74C3C;">加载失败，请检查网络连接</div>';
        });
}

function renderGuide(data) {
    var container = document.getElementById("guideContent");
    if (!container || !data.success || !data.categories) return;
    var html = "";
    data.categories.forEach(function(cat, idx) {
        var accentColor = cat.color || "#2D9B5E";
        html += '<div class="category-card" id="catcard-' + cat.id + '" style="--section-accent:' + accentColor + '">';
        html += '  <div class="category-card-header" onclick="toggleCategoryCard(\'' + cat.id + '\')">';
        html += '    <div class="cat-icon-badge" style="background:' + accentColor + '20; color:' + accentColor + '">' + (cat.icon || "📦") + '</div>';
        html += '    <div class="cat-header-info">';
        html += '      <div class="cat-header-name" style="color:' + accentColor + '">' + cat.name + '</div>';
        html += '      <div class="cat-header-desc">' + (cat.description || "") + '</div>';
        html += '    </div>';
        html += '    <svg class="cat-arrow" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>';
        html += '  </div>';
        html += '  <div class="category-card-body">';
        html += '    <div class="cat-body-inner">';

        if (cat.common_items && cat.common_items.length > 0) {
            html += '  <div class="cat-subsection">';
            html += '    <div class="cat-subtitle">常见物品</div>';
            html += '    <div class="cat-tag-list">';
            cat.common_items.forEach(function(item) { html += '<span class="cat-tag">' + item + '</span>'; });
            html += '    </div></div>';
        }

        if (cat.campus_special_items && cat.campus_special_items.length > 0) {
            html += '  <div class="cat-subsection">';
            html += '    <div class="cat-subtitle">校园特有物品</div>';
            html += '    <div class="cat-tag-list">';
            cat.campus_special_items.forEach(function(item) { html += '<span class="cat-tag" style="background:' + accentColor + '10;color:' + accentColor + ';font-weight:600">' + item + '</span>'; });
            html += '    </div></div>';
        }

        if (cat.disposal_notes && cat.disposal_notes.length > 0) {
            html += '  <div class="cat-subsection">';
            html += '    <div class="cat-subtitle">投放注意事项</div>';
            html += '    <ul class="cat-note-list">';
            cat.disposal_notes.forEach(function(note) { html += '<li>' + note + '</li>'; });
            html += '    </ul></div>';
        }

        html += '    </div></div></div>';
    });
    container.innerHTML = html;

    if (data.categories.length > 0) {
        toggleCategoryCard(data.categories[0].id);
    }
}

function toggleCategoryCard(catId) {
    var card = document.getElementById("catcard-" + catId);
    if (!card) return;
    var wasOpen = card.classList.contains("open");
    document.querySelectorAll(".category-card").forEach(function(c) { c.classList.remove("open"); });
    if (!wasOpen) card.classList.add("open");
}

// ==================== 易错对比数据加载与渲染 (F-2.4) ====================
function loadConfusingData() {
    var container = document.getElementById("confusingContent");
    if (!container) return;
    container.innerHTML = '<div class="confusing-loading">正在加载易错对比数据...</div>';

    fetch(API_BASE + "/api/guide/confusing")
        .then(function(r) { return r.json(); })
        .then(function(data) {
            document.getElementById("page-confusing").dataset.loaded = "1";
            renderConfusing(data);
        })
        .catch(function(err) {
            console.error("加载易错数据失败:", err);
            container.innerHTML = '<div class="confusing-loading" style="color:#E74C3C;">加载失败，请检查网络连接</div>';
        });
}

function renderConfusing(data) {
    var container = document.getElementById("confusingContent");
    if (!container || !data.success) return;
    var pairs = data.pairs || [];
    if (pairs.length === 0) {
        container.innerHTML = '<div class="confusing-loading">暂无易错对比数据</div>';
        return;
    }
    var html = '<div class="confusing-grid">';
    pairs.forEach(function(pair) {
        var freqClass = pair.frequency === "high" ? "freq-high" : (pair.frequency === "medium" ? "freq-medium" : "freq-low");
        var freqLabel = pair.frequency === "high" ? "高频误判" : (pair.frequency === "medium" ? "中频" : "低频");
        html += '<div class="confusing-card" onclick="showConfusingDetail(\'' + pair.id + '\')">';
        html += '  <div class="confusing-card-header">';
        html += '    <span class="confusing-freq ' + freqClass + '">' + freqLabel + '</span>';
        html += '    <div class="confusing-pair-names">' + pair.item_a_name + '<span class="confusing-vs">vs</span>' + pair.item_b_name + '</div>';
        html += '  </div>';
        html += '  <div class="confusing-reason">' + (pair.reason || "这两个物品容易被混淆") + '</div>';
        html += '  <div class="confusing-method">✓ ' + (pair.distinguish_method || "查看详情了解区分方法") + '</div>';
        html += '</div>';
    });
    html += '</div>';
    container.innerHTML = html;
}

function showConfusingDetail(pairId) {
    fetch(API_BASE + "/api/guide/confusing/" + pairId)
        .then(function(r) { return r.json(); })
        .then(function(data) {
            if (data.success && data.pair) {
                var p = data.pair;
                alert(
                    "【易错对比】\n\n" +
                    p.item_a_name + "（" + p.item_a_category + "）\nVS\n" +
                    p.item_b_name + "（" + p.item_b_category + "）\n\n" +
                    "混淆原因：" + (p.reason || "-") + "\n\n" +
                    "区分方法：" + (p.distinguish_method || "-") + "\n\n" +
                    "错误率：" + (p.error_rate || "-")
                );
            }
        })
        .catch(function(e) { console.error(e); });
}
</script>
