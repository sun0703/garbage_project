# GitHub Actions CI/CD 主工作流
# 在 PR 和 Push 时自动运行测试和代码检查

name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

  # 允许手动触发（用于重新运行失败的流程）
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.11"

jobs:
  # ============================================================
  # 任务1：代码风格检查 (Lint)
  # ============================================================
  lint:
    name: 🔍 Code Style Check
    runs-on: ubuntu-latest
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black isort mypy
          
      - name: 运行 Flake8 (代码规范检查)
        run: |
          # 停止构建如果存在语法错误或未定义的名称
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # 作为警告输出
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: 运行 Black (代码格式检查)
        run: |
          black --check --diff .
        continue-on-error: true  # 格式问题不阻塞，仅作为提示

      - name: 运行 isort (导入排序检查)
        run: |
          isort --check-only --diff .
        continue-on-error: true

  # ============================================================
  # 任务2：类型检查
  # ============================================================
  type-check:
    name: 🔎 Type Checking
    runs-on: ubuntu-latest
    needs: lint
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install mypy
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: 运行 MyPy 类型检查
        run: |
          mypy main.py utils/ --ignore-missing-imports || true
        continue-on-error: true  # 类型错误不阻塞，但会显示警告

  # ============================================================
  # 任务3：单元测试
  # ============================================================
  test:
    name: 🧪 Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    
    services:
      # 如果需要数据库服务可以在这里添加
      
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12']
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: 创建测试目录（如果不存在）
        run: mkdir -p tests

      - name: 创建基础测试文件（示例）
        run: |
          cat > tests/test_basic.py << 'EOF'
          """
          基础测试套件
          验证项目基本功能是否正常
          """
          import sys
          import os
          sys.path.insert(0, os.path.dirname(os.path.dirname(__file__)))
          
          def test_imports():
              """测试核心模块是否可以正常导入"""
              try:
                  import main
                  assert True, "main 模块导入成功"
              except ImportError as e:
                  raise AssertionError(f"导入失败: {e}")
          
          def test_requirements_exist():
              """测试依赖文件是否存在"""
              assert os.path.exists("requirements.txt"), "requirements.txt 文件不存在"
          
          def test_data_file_exists():
              """测试数据配置文件是否存在"""
              assert os.path.exists("data/waste.json"), "数据配置文件不存在"
          
          def test_html_file_exists():
              """测试前端页面是否存在"""
              assert os.path.exists("index.html"), "前端页面不存在"
          EOF

      - name: 运行测试
        run: |
          pytest tests/ -v --cov=. --cov-report=xml --cov-report=html \
            --junitxml=junit.xml \
            --tb=short

      - name: 上传测试报告
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report-${{ matrix.python-version }}
          path: |
            htmlcov/
            junit.xml
          retention-days: 7

      - name: 上传覆盖率到 Codecov（可选）
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.11'
        with:
          file: ./coverage.xml
          flags: unittests
          fail_ci_if_error: false

  # ============================================================
  # 任务4：安全扫描
  # ============================================================
  security:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest
    needs: [lint, type-check]
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 安装安全扫描工具
        run: |
          python -m pip install --upgrade pip
          pip install safety bandit

      - name: 运行 Safety (依赖漏洞检查)
        run: |
          safety check --full-report -r requirements.txt || true
        continue-on-error: true

      - name: 运行 Bandit (安全漏洞扫描)
        run: |
          bandit -r . -ll --skip B101 || true
        continue-on-error: true

  # ============================================================
  # 任务5：构建验证
  # ============================================================
  build:
    name: 🏗️ Build Verification
    runs-on: ubuntu-latest
    needs: [test, security]
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: 验证应用启动
        run: |
          # 测试 FastAPI 应用是否可以正常加载
          timeout 10s python -c "
          from main import app
          from fastapi.testclient import TestClient
          
          client = TestClient(app)
          
          # 测试根路径是否可访问
          response = client.get('/')
          print(f'根路径状态码: {response.status_code}')
          assert response.status_code in [200, 404], f'应用启动异常: {response.status_code}'
          print('✅ 应用启动验证通过')
          " || echo "⚠️ 应用启动测试跳过（可能是缺少某些依赖）"

  # ============================================================
  # 任务6：通知（可选）
  # ============================================================
  notify:
    name: 📢 Notify
    runs-on: ubuntu-latest
    needs: [build]
    if: always()
    
    steps:
      - name: 发送通知
        run: |
          echo "🎉 CI/CD 流程完成！"
          echo "📊 查看详细结果请访问 Actions 页面"
