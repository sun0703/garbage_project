# 垃圾分类AI助手 - Docker Compose
# 开发环境: docker compose up -d
# 环境变量: 复制 .env.example 为 .env 并修改

version: "3.8"

services:
  # Web应用
  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: ecosort-web
    ports:
      - "${PORT:-8001}:8001"
    env_file:
      - ../.env
    environment:
      - DATABASE_URL=postgresql://${PG_USER:-ecosort}:${PG_PASSWORD:-ecosort123}@db:5432/${PG_DB:-ecosort}
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ../data:/app/data
      - ../models:/app/models:ro
      - ../logs:/app/logs
      - ../static:/app/static:ro
      - ../uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - ecosort-net

  # PostgreSQL
  db:
    image: postgres:16-alpine
    container_name: ecosort-db
    environment:
      POSTGRES_USER: ${PG_USER:-ecosort}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-ecosort123}
      POSTGRES_DB: ${PG_DB:-ecosort}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "${PG_PORT:-5432}:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-ecosort}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ecosort-net

  # Redis
  redis:
    image: redis:7-alpine
    container_name: ecosort-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-ecosort2024} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redisdata:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-ecosort2024}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ecosort-net

  # Nginx反向代理
  nginx:
    image: nginx:alpine
    container_name: ecosort-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - ../static:/app/static:ro
      - ../uploads:/app/uploads:ro
    depends_on:
      - web
    restart: unless-stopped
    networks:
      - ecosort-net

volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local

networks:
  ecosort-net:
    driver: bridge
