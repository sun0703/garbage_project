# 自动化工作流
# 包含：欢迎新贡献者、自动标签、Issue 自动回复

name: Automation

on:
  issues:
    types: [opened, labeled]
  pull_request_target:
    types: [opened]

jobs:
  # ============================================================
  # 欢迎首次贡献者
  # ============================================================
  welcome:
    name: 👋 Welcome First-Time Contributors
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request_target'
    
    steps:
      - name: 检查是否为首次贡献者
        uses: actions/first-interaction@v1
        id: first_interaction
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          issue-message: |
            ## 🎉 欢迎你的第一个 Issue！
            
            感谢你花时间报告问题！我们会尽快查看并回应。
            
            为了更好地帮助你，请确保：
            - ✅ 提供了详细的问题描述
            - ✅ 包含了复现步骤
            - ✅ 附上了相关截图或日志
            
            如果有任何问题，随时在这里提问！
            
          pr-message: |
            ## 🎉 欢迎你的第一个 Pull Request！
            
            太棒了！感谢你对 **垃圾识别项目** 的贡献。🙌
            
            ### 📋 接下来的流程：
            
            1. 🔍 **自动化检查** - CI 会自动运行测试和代码检查
            2. 👀 **代码审查** - 维护者会审查你的代码
            3. 💬 **反馈讨论** - 可能会有一些修改建议
            4. ✅ **合并** - 审查通过后会被合并到主分支
            
            ### 💡 小贴士：
            
            - 请关注这个 PR 的通知，以便及时响应审查意见
            - 如果需要修改，直接推送到同一个分支即可
            - 有任何问题可以在这个 PR 中评论
            
            再次感谢你的贡献！♻️✨

      - name: 添加标签（如果是首次贡献）
        if: steps.first_interaction.outputs.is_first_time_contributor == 'true'
        uses: actions-ecosystem/action-add-labels@v1
        with:
          labels: "good first contribution"
          number: ${{ github.event.pull_request.number || github.event.issue.number }}

  # ============================================================
  # 自动添加标签
  # ============================================================
  auto-label:
    name: 🏷️ Auto Labeling
    runs-on: ubuntu-latest
    if: github.event_name == 'issues' && github.event.action == 'opened'
    
    steps:
      - name: 根据内容自动打标签
        uses: github/issue-labeler@v3.3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          configuration-path: .github/labeler.yml
          enable-versioned-regex: true
        continue-on-error: true

  # ============================================================
  # Issue 自动回复模板
  # ============================================================
  issue-response:
    name: 📝 Issue Auto Response
    runs-on: ubuntu-latest
    if: github.event_name == 'issues' && github.event.action == 'opened'
    
    steps:
      - name: 发送确认消息
        uses: actions/github-script@v7
        with:
          script: |
            const issueTitle = context.payload.issue.title;
            const issueNumber = context.payload.issue.number;
            const issueAuthor = context.payload.issue.user.login;
            
            // 构建欢迎消息
            const message = `## 📨 Issue 已收到
            
            @${issueAuthor} 感谢提交 Issue！🎯
            
            ### 📋 当前状态：
            - 🔖 编号: #${issueNumber}
            - 👤 创建者: @${issueAuthor}
            - ⏰ 时间: ${new Date().toLocaleString('zh-CN', { timeZone: 'Asia/Shanghai' })}
            
            ### ⏳ 后续处理：
            维护者会尽快审查这个问题，通常在 **24-48 小时内** 给出初步反馈。
            
            ---
            
            💡 **提示**: 
            - 如需补充信息，请直接在下方评论
            - 可以使用 \`@mention\` 来提醒特定人员
            - 查看 [贡献指南](https://github.com/${context.repo.owner}/${context.repo.repo}/blob/main/CONTRIBUTING.md) 了解更多`;
            
            // 发送评论
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: message
            });

  # ============================================================
  # PR 自动状态更新
  # ============================================================
  pr-status:
    name: 📊 PR Status Update
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request_target' && github.event.action == 'opened'
    
    steps:
      - name: 设置 PR 状态
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const author = pr.user.login;
            const changedFiles = pr.changed_files;
            const additions = pr.additions;
            const deletions = pr.deletions;
            
            // 判断 PR 大小
            let size = '🟢 小';
            if (changedFiles > 10 || additions > 500) {
              size = '🔴 大';
            } else if (changedFiles > 5 || additions > 200) {
              size = '🟡 中';
            }
            
            const body = `### 📊 PR 快速评估
            
            | 项目 | 数值 |
            |------|------|
            | 变更文件 | ${changedFiles} 个 |
            | 新增行数 | +${additions} |
            | 删除行数 | -${deletions} |
            | 净变化 | ${additions - deletions} 行 |
            | PR 规模 | ${size} |
            
            ---
            
            #### ⚡ 下一步：
            1. ✅ 等待 CI 检查通过
            2. 👀 等待维护者 Code Review
            3. 💬 及时响应审查意见
            
            > 🕐 预计审查时间：1-3 个工作日`;
            
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              body: body
            });
