# Alembic 数据库迁移配置
# 使用方式：
#   初始化: alembic upgrade head
#   创建迁移: alembic revision --autogenerate -m "描述"
#   执行迁移: alembic upgrade head
#   回滚:     alembic downgrade -1

[alembic]
# 迁移脚本目录
script_location = alembic
# 数据库连接字符串（优先使用环境变量，开发环境默认 SQLite）
sqlalchemy.url = sqlite:///data/app.db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
