# ==================== 校园垃圾分类AI助手 - Nginx 生产配置 ====================
# 使用方式：
#   1. 将此文件复制到 /etc/nginx/conf.d/ecosort.conf
#   2. 替换 ecosort.example.com 为实际域名
#   3. 配置 SSL 证书（见下方说明）
#   4. nginx -t && nginx -s reload

# ==================== HTTP → HTTPS 重定向 ====================
server {
    listen 80;
    listen [::]:80;
    server_name trashai.qzz.io;

    # Let's Encrypt 验证路径（证书申请时需要）
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # 其余请求全部重定向到 HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ==================== HTTPS 主配置 ====================
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name trashai.qzz.io;

    # ==================== SSL 证书配置 ====================
    # Let's Encrypt 免费证书（推荐）
    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    # SSL 安全参数（Mozilla Intermediate 级别）
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # HSTS（强制 HTTPS，生产环境启用）
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # ==================== 安全头 ====================
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ==================== 日志配置 ====================
    access_log /var/log/nginx/ecosort_access.log;
    error_log  /var/log/nginx/ecosort_error.log;

    # ==================== Gzip 压缩 ====================
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff2;

    # ==================== 静态资源（直接由 Nginx 服务） ====================
    location /static/ {
        alias /app/static/;

        # 长期缓存：CSS/JS/图片等静态资源（文件名含 hash 时可设更长时间）
        expires 7d;
        add_header Cache-Control "public, immutable";

        # 开发环境可注释掉上面的缓存，改为：
        # add_header Cache-Control "no-cache";

        access_log off;
    }

    # favicon 和 PWA 相关文件
    location = /favicon.ico {
        alias /app/static/favicon.ico;
        expires 30d;
        access_log off;
    }

    location = /manifest.json {
        alias /app/static/manifest.json;
        expires 1d;
        add_header Cache-Control "public";
    }

    location = /robots.txt {
        alias /app/static/robots.txt;
        expires 1d;
        access_log off;
    }

    location = /sitemap.xml {
        alias /app/static/sitemap.xml;
        expires 1d;
        access_log off;
    }

    # ==================== API 反向代理 ====================
    location /api/ {
        proxy_pass http://web:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # API 不缓存
        add_header Cache-Control "no-store, no-cache";

        # 超时设置（AI 推理可能较慢）
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;

        # 请求体大小限制（图片上传）
        client_max_body_size 10m;
    }

    # ==================== 健康检查端点 ====================
    location /api/health {
        proxy_pass http://web:8001;
        proxy_set_header Host $host;
        access_log off;
    }

    # ==================== 前端 SPA 路由兜底 ====================
    location / {
        proxy_pass http://web:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ==================== 上传文件目录（如有独立存储） ====================
    location /uploads/ {
        alias /app/uploads/;
        expires 30d;
        access_log off;
    }
}
