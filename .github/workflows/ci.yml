name: CI/CD Pipeline

on:
  push:
    branches: ['**']  # 触发所有分支的push
  pull_request:
    branches: ['**']  # 触发所有分支的PR
  workflow_dispatch:  # 允许手动触发

jobs:
  # ==================== 代码质量检查 ====================
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install flake8 pylint
      - name: Flake8 检查
        run: flake8 . --count --max-line-length=127 --statistics --exclude=.git,__pycache__,venv,.venv,models,data
        continue-on-error: true

  # ==================== 单元测试 ====================
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: 安装系统依赖（OpenCV 必需）
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libgl1 libglib2.0-0
      - name: 安装Python依赖
        run: |
          pip install --no-cache-dir -r requirements.txt
          pip install --no-cache-dir pytest pytest-cov httpx
      - name: 运行测试
        run: pytest --cov=. --cov-report=xml --cov-report=term -v -s
      - name: 上传覆盖率报告
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  # ==================== Docker 构建验证 ====================
  build:
    needs: [lint, test]  # 确保代码检查和测试完成后再构建
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 构建 Docker 镜像
        run: docker build -t waste-classifier:latest -f docker/Dockerfile .
